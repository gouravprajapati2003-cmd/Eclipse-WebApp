<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Verification</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        padding: 25px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        max-width: 600px;
        backdrop-filter: blur(8px);
    }

    h1 {
        font-size: 22px;
        line-height: 1.5;
        font-weight: 600;
    }
</style>

</head>
<body>

<div class="container">
    <h1>We have sent an email to your registered email address.<br>
    Please check your inbox to verify your account.</h1>
     <button type="submit">Resend Link</button>
</div>

</body>
</html>
