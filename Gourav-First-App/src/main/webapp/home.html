<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Web App</title>

<style>
    /* Navbar styling */
    #navbar {
        background-color: #222;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 50px;
    }

    #navbar a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-family: Arial, sans-serif;
    }

    #navbar a:hover {
        color: #00ffcc;
    }

    #logo {
        font-weight: bold;
        margin-right: 150px;
        color: #f08804;
	    font-size: 25px;
    }

    #navbar input {
        padding: 5px 10px;
        font-size: 16px;
    }

    #navbar button {
        padding: 6px 12px;
        font-size: 16px;
        cursor: pointer;
        background-color: #00eaff;
        border: none;
        border-radius: 4px;
    }

    #navbar button:hover {
        background-color: #0099cc;
    }

    /* Center content */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
    }

    div p {
        margin-top: 50px;
        text-align: center;
        font-size: 50px;
        font-weight: bold;
        color:darkorange;
    }
</style>

</head>
<body>

<div id="navbar">
      <a id="logo" href="#">My Web App.in</a>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact Us</a>
      <a href="#">Help Us</a>

      <input placeholder="Search My Web App.in">
      <button>Search</button>
</div>

<div>
    <p>Welcome To You,Gourav Kumar Prajapati</p>
</div>

</body>
</html>
